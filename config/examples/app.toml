# Copy to config/app.toml and adjust paths, SMTP, and delivery settings.
# config/app.toml is gitignored as operator-local.

[database]
url = "sqlite:///./var/app.db"

[storage]
root_dir = "./var"
raw_dir = "./var/raw"
review_outbox_dir = "./var/review/outbox"
review_inbox_dir = "./var/review/inbox"
lock_dir = "./var/locks"

[http]
timeout_seconds = 20.0
max_attempts = 3
user_agent = "findmejobs/0.1.0"

[logging]
level = "INFO"

[delivery]
channel = "email"
daily_hour = 8
digest_max_items = 10

[delivery.email]
enabled = false
host = "smtp.example.com"
port = 587
username = ""
# SMTP password must be provided via FINDMEJOBS_SMTP_PASSWORD.
use_tls = true
sender = "findmejobs@example.com"
recipient = "operator@example.com"

[quality]
max_parse_error_rate = 0.25
max_skip_ratio_tier_b = 0.35
max_failed_sources_per_run = 3
max_delivery_failures_24h = 3
